<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Beat Tap</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { width:100%; height:100%; position:fixed; overflow:hidden; }
body { background:#0f172a; color:#f1f5f9; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
.screen { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
.screen.active { display:flex; }
.center { flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px; }
h1 { font-size:42px; margin-bottom:8px; }
h2 { font-size:28px; margin-bottom:25px; }
p.sub { color:#94a3b8; margin-bottom:30px; font-size:14px; }
.btn { background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; border:none; padding:14px 26px; border-radius:12px; cursor:pointer; font-weight:600; font-size:16px; margin:8px; box-shadow:0 4px 12px rgba(59,130,246,.3); touch-action:manipulation; }
.btn:active { transform:scale(.96); }
.btn-outline { background:rgba(30,41,59,.7); border:2px solid #3b82f6; box-shadow:none; }
.color-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:25px; width:100%; max-width:280px; }
.color-option { width:56px; height:56px; border-radius:50%; border:3px solid transparent; }
.color-option.selected { border-color:white; }
.char-preview { font-size:70px; margin-bottom:20px; }
.game-screen { flex-direction:column; }
.game-header { background:rgba(59,130,246,.15); padding:14px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid rgba(59,130,246,.2); }
.game-stats { display:flex; gap:20px; font-weight:700; font-size:18px; }
.game-stats span.lbl { display:block; font-size:10px; font-weight:600; color:#94a3b8; text-transform:uppercase; }
.game-container { flex:1; position:relative; overflow:hidden; background:linear-gradient(180deg,#0f172a 0%,#1a1f35 100%); }
.note { position:absolute; width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; box-shadow:0 0 18px rgba(59,130,246,.6); touch-action:none; will-change:transform; }
.tap-zone { position:absolute; bottom:0; left:0; right:0; height:110px; background:linear-gradient(180deg,rgba(59,130,246,.05),rgba(59,130,246,.25)); border-top:3px solid #3b82f6; }
.feedback { position:absolute; font-size:22px; font-weight:800; pointer-events:none; animation:floatUp .7s ease-out forwards; }
@keyframes floatUp { 0%{opacity:1; transform:translateY(0);} 100%{opacity:0; transform:translateY(-40px);} }
.results-stats { background:rgba(30,41,59,.7); padding:18px; border-radius:12px; margin-bottom:20px; width:100%; max-width:280px; }
.stat-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(59,130,246,.15); font-size:14px; }
.stat-row:last-child { border-bottom:none; }
.final-score { font-size:56px; font-weight:800; color:#3b82f6; margin-bottom:16px; }
.badge-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:20px; min-height:50px; }
.badge-chip { font-size:34px; background:rgba(59,130,246,.12); border:2px solid #3b82f6; border-radius:10px; padding:8px; }
.badges-screen { padding:20px; overflow-y:auto; }
.badges-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:20px 0; }
.badge-card { background:rgba(30,41,59,.7); border:2px solid rgba(59,130,246,.2); border-radius:12px; padding:14px 8px; text-align:center; }
.badge-card.locked { opacity:.35; }
.badge-icon { font-size:32px; margin-bottom:6px; }
.badge-name { font-size:11px; color:#94a3b8; font-weight:600; }
</style>
</head>
<body>

<div id="menuScreen" class="screen active center">
  <h1>🎵 Beat Tap</h1>
  <p class="sub">Tap the balls on the beat</p>
  <button class="btn" onclick="goTo('customization')">Play</button>
  <button class="btn btn-outline" onclick="openBadges()">🏆 Badges</button>
</div>

<div id="customizationScreen" class="screen center">
  <h2>Choose Your Ball</h2>
  <div class="char-preview" id="charPreview">🟠</div>
  <div class="color-grid" id="colorGrid"></div>
  <button class="btn" onclick="goTo('difficulty')">Next</button>
  <button class="btn btn-outline" onclick="goTo('menu')">Back</button>
</div>

<div id="difficultyScreen" class="screen center">
  <h2>Difficulty</h2>
  <button class="btn" style="width:220px" onclick="startGame('easy')">🎵 Easy</button>
  <button class="btn" style="width:220px" onclick="startGame('medium')">🎵🎵 Medium</button>
  <button class="btn" style="width:220px" onclick="startGame('hard')">🎵🎵🎵 Hard</button>
  <button class="btn btn-outline" style="width:220px" onclick="goTo('customization')">Back</button>
</div>

<div id="gameScreen" class="screen game-screen">
  <div class="game-header">
    <div class="game-stats">
      <div><span class="lbl">Score</span><span id="scoreVal">0</span></div>
      <div><span class="lbl">Combo</span><span id="comboVal">0</span></div>
    </div>
    <button class="btn" style="margin:0;padding:8px 16px;font-size:13px;" onclick="endGame()">End</button>
  </div>
  <div class="game-container" id="gameContainer"><div class="tap-zone"></div></div>
</div>

<div id="resultsScreen" class="screen center">
  <h2>Game Over!</h2>
  <div class="final-score" id="finalScore">0</div>
  <div class="results-stats">
    <div class="stat-row"><span>Perfect</span><span id="statPerfect">0</span></div>
    <div class="stat-row"><span>Good</span><span id="statGood">0</span></div>
    <div class="stat-row"><span>Missed</span><span id="statMissed">0</span></div>
    <div class="stat-row"><span>Accuracy</span><span id="statAcc">0%</span></div>
  </div>
  <div class="badge-row" id="newBadgeRow"></div>
  <button class="btn" onclick="playAgain()">Play Again</button>
  <button class="btn btn-outline" onclick="goTo('menu')">Menu</button>
</div>

<div id="badgesScreen" class="screen badges-screen">
  <h2 style="text-align:center">🏆 Badges</h2>
  <div class="badges-grid" id="badgesGrid"></div>
  <button class="btn" onclick="goTo('menu')">Back</button>
</div>

<script>
const colors = { '🟠':'#ff8c42','🔵':'#3b82f6','🟢':'#10b981','🟣':'#a855f7','🔴':'#ef4444','🟡':'#eab308','⚪':'#f1f5f9','🤎':'#a16207' };
const allBadges = {
  first:{icon:'🎯',name:'First Steps'}, score100:{icon:'💯',name:'Century'},
  score500:{icon:'🔥',name:'On Fire'}, score1000:{icon:'⭐',name:'Legend'},
  combo10:{icon:'🔗',name:'Streak'}, combo20:{icon:'💪',name:'Master'},
  perfect5:{icon:'✨',name:'Perfect'}, easyDone:{icon:'😎',name:'Chill'},
  mediumDone:{icon:'🎮',name:'Challenge'}, hardDone:{icon:'🤯',name:'Extreme'}
};

let game = {
  score:0, combo:0, maxCombo:0, perfect:0, good:0, missed:0,
  active:false, difficulty:'easy', color:'🟠', notes:[], timers:[],
  badges: JSON.parse(localStorage.getItem('badges')) || {}
};

function goTo(name){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(name+'Screen').classList.add('active'); }
function openBadges(){ renderBadgesGrid(); goTo('badges'); }

function renderColorGrid(){
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  Object.keys(colors).forEach(c=>{
    const opt = document.createElement('div');
    opt.className = 'color-option' + (c===game.color ? ' selected':'');
    opt.style.backgroundColor = colors[c];
    opt.onclick = () => { game.color = c; renderColorGrid(); document.getElementById('charPreview').textContent = c; };
    grid.appendChild(opt);
  });
}

function updateStats(){
  document.getElementById('scoreVal').textContent = game.score;
  document.getElementById('comboVal').textContent = game.combo;
}

function startGame(diff){
  game.difficulty = diff;
  game.score=0; game.combo=0; game.maxCombo=0; game.perfect=0; game.good=0; game.missed=0;
  game.timers.forEach(id=>clearTimeout(id));
  game.timers = [];
  game.notes = [];
  game.active = true;

  goTo('game');
  document.getElementById('gameContainer').innerHTML = '<div class="tap-zone"></div>';
  updateStats();

  const counts = { easy:15, medium:22, hard:30 };
  const spacings = { easy:1000, medium:750, hard:550 };
  const count = counts[diff], spacing = spacings[diff];

  for (let i=0; i<count; i++){
    const id = setTimeout(()=>{ if(game.active) spawnNote(); }, i*spacing);
    game.timers.push(id);
  }
  const endId = setTimeout(()=>{ if(game.active) endGame(); }, count*spacing + 3200);
  game.timers.push(endId);

  requestAnimationFrame(tick);
}

function spawnNote(){
  const durations = { easy:2600, medium:1900, hard:1300 };
  const el = document.createElement('div');
  el.className = 'note';
  el.textContent = game.color;
  el.style.background = colors[game.color];
  el.style.left = (Math.random() * (window.innerWidth - 56)) + 'px';
  el.style.top = '0px';

  document.getElementById('gameContainer').appendChild(el);

  const note = { el, spawnTime: Date.now(), duration: durations[game.difficulty], tapped:false, removed:false, currentY:0 };
  game.notes.push(note);

  function handleTap(e){
    if (e.cancelable) e.preventDefault();
    if (note.tapped || note.removed) return;
    note.tapped = true; note.removed = true;

    const elapsed = Date.now() - note.spawnTime;
    const diff = Math.abs(elapsed - note.duration);

    if (diff < 130){ game.perfect++; game.score+=100; game.combo++; flash(el,note,'Perfect!','#10b981'); }
    else if (diff < 320){ game.good++; game.score+=50; game.combo++; flash(el,note,'Good!','#3b82f6'); }
    else { game.missed++; game.combo=0; flash(el,note,'Miss','#ef4444'); }

    if (game.combo > game.maxCombo) game.maxCombo = game.combo;
    updateStats();
    el.remove();
  }
  el.addEventListener('touchstart', handleTap, {passive:false});
  el.addEventListener('click', handleTap);
}

function flash(el, note, text, color){
  const fb = document.createElement('div');
  fb.className = 'feedback';
  fb.textContent = text;
  fb.style.color = color;
  fb.style.left = el.style.left;
  fb.style.top = note.currentY + 'px';
  document.getElementById('gameContainer').appendChild(fb);
  setTimeout(()=>fb.remove(), 700);
}

function tick(){
  if (!game.active) return;
  const container = document.getElementById('gameContainer');
  const zoneTop = container.clientHeight - 115;

  game.notes.forEach(note=>{
    if (note.removed) return;
    const progress = (Date.now() - note.spawnTime) / note.duration;
    const y = progress * zoneTop;
    note.currentY = y;
    note.el.style.transform = 'translateY(' + y + 'px)';

    if (progress >= 1.25 && !note.tapped){
      note.removed = true;
      game.missed++; game.combo = 0;
      note.el.remove();
      updateStats();
    }
  });
  game.notes = game.notes.filter(n=>!n.removed);
  requestAnimationFrame(tick);
}

function endGame(){
  game.active = false;
  game.timers.forEach(id=>clearTimeout(id));
  game.timers = [];
  document.querySelectorAll('.note').forEach(n=>n.remove());

  const total = game.perfect+game.good+game.missed;
  const accuracy = total>0 ? Math.round((game.perfect+game.good)/total*100) : 0;
  const earned = checkBadges(accuracy);

  document.getElementById('finalScore').textContent = game.score;
  document.getElementById('statPerfect').textContent = game.perfect;
  document.getElementById('statGood').textContent = game.good;
  document.getElementById('statMissed').textContent = game.missed;
  document.getElementById('statAcc').textContent = accuracy + '%';

  const row = document.getElementById('newBadgeRow');
  row.innerHTML = earned.length ? earned.map(k=>`<div class="badge-chip">${allBadges[k].icon}</div>`).join('') : '';

  goTo('results');
}

function checkBadges(){
  const earned = [];
  const award = k => { if (!game.badges[k]){ game.badges[k]=true; earned.push(k); } };
  award('first');
  if (game.score>=100) award('score100');
  if (game.score>=500) award('score500');
  if (game.score>=1000) award('score1000');
  if (game.maxCombo>=10) award('combo10');
  if (game.maxCombo>=20) award('combo20');
  if (game.perfect>=5) award('perfect5');
  if (game.difficulty==='easy') award('easyDone');
  if (game.difficulty==='medium') award('mediumDone');
  if (game.difficulty==='hard') award('hardDone');
  localStorage.setItem('badges', JSON.stringify(game.badges));
  return earned;
}

function renderBadgesGrid(){
  const grid = document.getElementById('badgesGrid');
  grid.innerHTML = Object.entries(allBadges).map(([k,b])=>`
    <div class="badge-card ${game.badges[k]?'':'locked'}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
    </div>`).join('');
}

function playAgain(){ startGame(game.difficulty); }

renderColorGrid();
</script>
</body>
</html>
