<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .contexts-area {
            margin-bottom: 30px;
            min-height: 200px;
        }
        
        .empty-message {
            text-align: center;
            color: #94a3b8;
            padding: 40px 20px;
            border: 2px dashed #3b82f6;
            border-radius: 8px;
        }
        
        .context-card {
            background-color: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .context-name {
            font-size: 18px;
            font-weight: bold;
        }
        
        .delete-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        
        .btn:active {
            background-color: #2563eb;
        }
        
        .back-btn {
            background-color: #64748b;
            margin-bottom: 20px;
            width: auto;
            padding: 8px 16px;
        }
        
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
        }
        
        .detail-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .aliases-list {
            margin-bottom: 20px;
            min-height: 150px;
        }
        
        .alias-card {
            background-color: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .alias-email {
            font-family: monospace;
            font-size: 14px;
            color: #93c5fd;
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .alias-note {
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- DASHBOARD SCREEN -->
        <div id="dashboardScreen" class="screen active">
            <h1>🔐 Privacy Vault</h1>
            
            <div class="contexts-area" id="contextsArea">
                <div class="empty-message" id="emptyMessage">
                    <p>No contexts yet. Create one to get started!</p>
                </div>
            </div>
            
            <button class="btn" id="newContextBtn">+ New Context</button>
        </div>
        
        <!-- DETAIL SCREEN -->
        <div id="detailScreen" class="screen">
            <button class="btn back-btn" onclick="showScreen('dashboardScreen')">← Back</button>
            
            <div class="detail-header">
                <h1 id="detailTitle"></h1>
            </div>
            
            <h2 style="font-size: 18px; margin-bottom: 15px;">Alias Emails</h2>
            <div class="aliases-list" id="aliasesList">
                <div style="text-align: center; color: #94a3b8; padding: 40px 20px;">
                    <p>No aliases yet. Add one to get started!</p>
                </div>
            </div>
            
            <button class="btn" id="addAliasBtn">+ Add Alias Email</button>
        </div>
    </div>
