<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Privacy Vault">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230f172a' width='180' height='180'/><text x='90' y='100' font-size='80' text-anchor='middle' dy='.3em' fill='%23f8fafc'>🔐</text></svg>">

    <title>Privacy Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .contexts-area {
            margin-bottom: 30px;
            min-height: 200px;
        }
        
        .empty-message {
            text-align: center;
            color: #94a3b8;
            padding: 40px 20px;
            border: 2px dashed #3b82f6;
            border-radius: 8px;
        }
        
        .context-card {
            background-color: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .context-name {
            font-size: 18px;
            font-weight: bold;
        }
        
        .delete-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        
        .btn:active {
            background-color: #2563eb;
        }
        
        .back-btn {
            background-color: #64748b;
            margin-bottom: 20px;
            width: auto;
            padding: 8px 16px;
        }
        
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
        }
        
        .detail-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .aliases-list {
            margin-bottom: 20px;
            min-height: 150px;
        }
        
        .alias-card {
            background-color: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .alias-email {
            font-family: monospace;
            font-size: 14px;
            color: #93c5fd;
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .alias-note {
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- DASHBOARD SCREEN -->
        <div id="dashboardScreen" class="screen active">
            <h1>🔐 Privacy Vault</h1>
            
            <div class="contexts-area" id="contextsArea">
                <div class="empty-message" id="emptyMessage">
                    <p>No contexts yet. Create one to get started!</p>
                </div>
            </div>
            
            <button class="btn" id="newContextBtn">+ New Context</button>
        </div>
        
        <!-- DETAIL SCREEN -->
        <div id="detailScreen" class="screen">
            <button class="btn back-btn" onclick="showScreen('dashboardScreen')">← Back</button>
            
            <div class="detail-header">
                <h1 id="detailTitle"></h1>
            </div>
            
            <h2 style="font-size: 18px; margin-bottom: 15px;">Alias Emails</h2>
            <div class="aliases-list" id="aliasesList">
                <div style="text-align: center; color: #94a3b8; padding: 40px 20px;">
                    <p>No aliases yet. Add one to get started!</p>
                </div>
            </div>
            
            <button class="btn" id="addAliasBtn">+ Add Alias Email</button>
        </div>
    </div>

    <script>
        let currentContextIndex = null;
        
        // Random words for alias generator
        const adjectives = ['happy', 'quick', 'bright', 'calm', 'clever', 'swift', 'bold', 'gentle', 'keen', 'lively', 'mighty', 'noble', 'proud', 'quiet', 'rare', 'smart', 'tidy', 'unique', 'vivid', 'warm', 'wise', 'zealous', 'artistic', 'curious', 'daring', 'eager', 'fancy', 'golden', 'happy', 'honest', 'joyful', 'keen', 'kind', 'lively', 'merry', 'neat', 'open', 'perfect', 'quiet', 'radiant', 'sincere', 'trusty', 'unique', 'vivid', 'witty'];
        
        const nouns = ['apple', 'beach', 'cloud', 'dance', 'eagle', 'forest', 'guitar', 'heart', 'island', 'jungle', 'knight', 'light', 'mountain', 'night', 'ocean', 'panda', 'quest', 'river', 'storm', 'tiger', 'unity', 'valley', 'whale', 'xray', 'yacht', 'zebra', 'anchor', 'breeze', 'compass', 'dragon', 'echo', 'flame', 'glance', 'harmony', 'infinity', 'journey', 'karma', 'letter', 'music', 'nature', 'orbit', 'peace', 'quantum', 'rhythm', 'spirit', 'temple', 'universe', 'victory', 'wonder'];
        
        // Generate random alias
        function generateAlias() {
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const noun = nouns[Math.floor(Math.random() * nouns.length)];
            const numbers = Math.floor(Math.random() * 1000);
            return `${adj}${noun}${numbers}@alias.example`;
        }
        
        // Switch between screens
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
        
        // Load and display contexts
        function loadContexts() {
            const contextsArea = document.getElementById('contextsArea');
            const emptyMessage = document.getElementById('emptyMessage');
            const savedContexts = JSON.parse(localStorage.getItem('contexts')) || [];
            
            if (savedContexts.length === 0) {
                emptyMessage.style.display = 'block';
                contextsArea.innerHTML = '';
            } else {
                emptyMessage.style.display = 'none';
                contextsArea.innerHTML = '';
                savedContexts.forEach((context, index) => {
                    const card = document.createElement('div');
                    card.className = 'context-card';
                    card.innerHTML = `
                        <span class="context-name">${context.name}</span>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteContext(${index})">Delete</button>
                    `;
                    card.onclick = () => openContext(index);
                    contextsArea.appendChild(card);
                });
            }
        }
        
        // Open context detail screen
        function openContext(index) {
            currentContextIndex = index;
            const savedContexts = JSON.parse(localStorage.getItem('contexts')) || [];
            const context = savedContexts[index];
            
            document.getElementById('detailTitle').textContent = context.name;
            
            const aliasesList = document.getElementById('aliasesList');
            if (!context.aliases || context.aliases.length === 0) {
                aliasesList.innerHTML = `
                    <div style="text-align: center; color: #94a3b8; padding: 40px 20px;">
                        <p>No aliases yet. Add one to get started!</p>
                    </div>
                `;
            } else {
                aliasesList.innerHTML = '';
                                context.aliases.forEach((alias, aliasIndex) => {
                    const aliasCard = document.createElement('div');
                    aliasCard.className = 'alias-card';
                    aliasCard.innerHTML = `
                        <div class="alias-email">${alias.email}</div>
                        <div class="alias-note">${alias.note || 'No note'}</div>
                        <div style="display: flex; gap: 8px; margin-top: 10px;">
                            <button class="btn" style="flex: 1; padding: 8px; font-size: 14px;" onclick="copyAlias('${alias.email}')">Copy</button>
                            <button class="delete-btn" onclick="deleteAlias(${index}, ${aliasIndex})" style="flex: 1; padding: 8px;">Delete</button>
                        </div>
                    `;
                    aliasesList.appendChild(aliasCard);
                });

            }
            
            showScreen('detailScreen');
        }
        
        // Create a new context
        document.getElementById('newContextBtn').addEventListener('click', function() {
            const contextName = prompt('What do you want to call this context? (e.g., Shopping, Gaming, School)');
            
            if (contextName && contextName.trim() !== '') {
                const savedContexts = JSON.parse(localStorage.getItem('contexts')) || [];
                savedContexts.push({
                    name: contextName.trim(),
                    aliases: [],
                    createdAt: new Date().toISOString()
                });
                localStorage.setItem('contexts', JSON.stringify(savedContexts));
                loadContexts();
            }
        });
        
               // Copy alias to clipboard
        function copyAlias(email) {
            navigator.clipboard.writeText(email).then(() => {
                alert('Copied: ' + email);
            });
        }
        
        // Delete an alias
        function deleteAlias(contextIndex, aliasIndex) {
            const savedContexts = JSON.parse(localStorage.getItem('contexts')) || [];
            savedContexts[contextIndex].aliases.splice(aliasIndex, 1);
            localStorage.setItem('contexts', JSON.stringify(savedContexts));
            openContext(contextIndex);
        }
        

        // Delete a context
        function deleteContext(index) {
            if (confirm('Are you sure you want to delete this context?')) {
                const savedContexts = JSON.parse(localStorage.getItem('contexts')) || [];
                savedContexts.splice(index, 1);
                localStorage.setItem('contexts', JSON.stringify(savedContexts));
                loadContexts();
            }
        }
        
        // Add alias
        document.getElementById('addAliasBtn').addEventListener('click', function() {
            const generatedAlias = generateAlias();
            const note = prompt(`Your new alias email is:\n\n${generatedAlias}\n\nWhat site are you using this for? (e.g., Amazon, Netflix, Gmail)`);
            
            if (note !== null) {
                const savedContexts = JSON.parse(localStorage.getItem('contexts')) || [];
                const context = savedContexts[currentContextIndex];
                
                if (!context.aliases) {
                    context.aliases = [];
                }
                
                context.aliases.push({
                    email: generatedAlias,
                    note: note.trim() || 'No note',
                    createdAt: new Date().toISOString()
                });
                
                localStorage.setItem('contexts', JSON.stringify(savedContexts));
                openContext(currentContextIndex);
            }
        });
        
        // Load contexts when page first opens
        loadContexts();
    </script>
</body>
</html>
