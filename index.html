<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Vault</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Privacy Vault">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        h2 {
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .templates-section {
            margin-bottom: 30px;
        }
        
        .templates-title {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .template-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .template-btn {
            background-color: #1e293b;
            color: #f8fafc;
            border: 1px solid #3b82f6;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            flex: 1;
            min-width: 95px;
        }
        
        .template-btn:active {
            background-color: #3b82f6;
        }
        
        .contexts-area {
            margin-bottom: 30px;
            min-height: 200px;
        }
        
        .empty-message {
            text-align: center;
            color: #94a3b8;
            padding: 40px 20px;
            border: 2px dashed #3b82f6;
            border-radius: 8px;
        }
        
        .context-card {
            background-color: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .context-name {
            font-size: 18px;
            font-weight: bold;
        }
        
        .alias-card {
            background-color: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .alias-email {
            font-family: monospace;
            font-size: 14px;
            color: #93c5fd;
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .alias-note {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        
        .alias-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .btn:active {
            background-color: #2563eb;
        }
        
        .delete-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .copy-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .back-btn {
            background-color: #64748b;
            width: auto;
            padding: 8px 16px;
        }
        
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- DASHBOARD -->
        <div id="dashboard" class="screen active">
            <h1>🔐 Privacy Vault</h1>
            
            <div class="templates-section">
                <div class="templates-title">Quick Templates</div>
                <div class="template-buttons">
                    <button class="template-btn" onclick="addTemplate('Shopping')">🛍️ Shopping</button>
                    <button class="template-btn" onclick="addTemplate('Gaming')">🎮 Gaming</button>
                    <button class="template-btn" onclick="addTemplate('Social Media')">📱 Social</button>
                    <button class="template-btn" onclick="addTemplate('Work')">💼 Work</button>
                    <button class="template-btn" onclick="addTemplate('School')">🎓 School</button>
                </div>
            </div>
            
            <div class="contexts-area" id="contextsArea">
                <div class="empty-message">No contexts yet. Create one!</div>
            </div>
            
            <button class="btn" id="btnNewContext">+ New Context</button>
        </div>
        
        <!-- DETAIL VIEW -->
        <div id="detail" class="screen">
            <button class="btn back-btn" onclick="showScreen('dashboard')">← Back</button>
            
            <h1 id="contextName"></h1>
            
            <h2>Aliases</h2>
            <div id="aliasesContainer" class="aliases-area"></div>
            
            <button class="btn" id="btnAddAlias">+ Add Alias</button>
        </div>
    </div>

    <script>
        const adjectives = ['happy', 'quick', 'bright', 'calm', 'clever', 'swift', 'bold', 'gentle', 'keen', 'lively', 'mighty', 'noble', 'proud', 'quiet', 'rare', 'smart', 'tidy', 'unique', 'vivid', 'warm', 'wise', 'zealous', 'artistic', 'curious', 'daring', 'eager', 'fancy', 'golden'];
        const nouns = ['apple', 'beach', 'cloud', 'dance', 'eagle', 'forest', 'guitar', 'heart', 'island', 'jungle', 'knight', 'light', 'mountain', 'night', 'ocean', 'panda', 'quest', 'river', 'storm', 'tiger', 'unity', 'valley', 'whale', 'yacht', 'zebra'];
        
        let currentContextIndex = null;
        
        function generateAlias() {
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const noun = nouns[Math.floor(Math.random() * nouns.length)];
            const num = Math.floor(Math.random() * 1000);
            return `${adj}${noun}${num}@alias.example`;
        }
        
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
        
        function saveContexts(contexts) {
            localStorage.setItem('contexts', JSON.stringify(contexts));
        }
        
        function getContexts() {
            return JSON.parse(localStorage.getItem('contexts')) || [];
        }
        
        function renderDashboard() {
            const contexts = getContexts();
            const area = document.getElementById('contextsArea');
            
            if (contexts.length === 0) {
                area.innerHTML = '<div class="empty-message">No contexts yet. Create one!</div>';
                return;
            }
            
            area.innerHTML = '';
            contexts.forEach((ctx, idx) => {
                const card = document.createElement('div');
                card.className = 'context-card';
                card.innerHTML = `
                    <span class="context-name">${ctx.name}</span>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteContext(${idx})">Delete</button>
                `;
                card.onclick = () => viewContext(idx);
                area.appendChild(card);
            });
        }
        
        function viewContext(idx) {
            currentContextIndex = idx;
            const contexts = getContexts();
            const ctx = contexts[idx];
            
            document.getElementById('contextName').textContent = ctx.name;
            
            const container = document.getElementById('aliasesContainer');
            if (!ctx.aliases || ctx.aliases.length === 0) {
                container.innerHTML = '<div class="empty-message">No aliases yet!</div>';
            } else {
                container.innerHTML = '';
                ctx.aliases.forEach((alias, aliasIdx) => {
                    const card = document.createElement('div');
                    card.className = 'alias-card';
                    card.innerHTML = `
                        <div class="alias-email">${alias.email}</div>
                        <div class="alias-note">${alias.note || 'No note'}</div>
                        <div class="alias-buttons">
                            <button class="copy-btn" onclick="copyAlias('${alias.email}')">Copy</button>
                            <button class="delete-btn" onclick="deleteAlias(${idx}, ${aliasIdx})">Delete</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
            
            showScreen('detail');
        }
        
        function addTemplate(templateName) {
            const contexts = getContexts();
            
            if (contexts.find(c => c.name === templateName)) {
                alert('You already have a "' + templateName + '" context!');
                return;
            }
            
            contexts.push({
                name: templateName,
                aliases: []
            });
            saveContexts(contexts);
            renderDashboard();
        }
        
        function deleteContext(idx) {
            if (confirm('Delete this context?')) {
                const contexts = getContexts();
                contexts.splice(idx, 1);
                saveContexts(contexts);
                renderDashboard();
            }
        }
        
        function deleteAlias(contextIdx, aliasIdx) {
            const contexts = getContexts();
            contexts[contextIdx].aliases.splice(aliasIdx, 1);
            saveContexts(contexts);
            viewContext(contextIdx);
        }
        
        function copyAlias(email) {
            navigator.clipboard.writeText(email).then(() => {
                alert('Copied: ' + email);
            });
        }
        
        // Button events
        document.getElementById('btnNewContext').onclick = function() {
            const name = prompt('Context name? (e.g., Shopping, Gaming)');
            if (name && name.trim()) {
                const contexts = getContexts();
                contexts.push({
                    name: name.trim(),
                    aliases: []
                });
                saveContexts(contexts);
                renderDashboard();
            }
        };
        
        document.getElementById('btnAddAlias').onclick = function() {
            const alias = generateAlias();
            const note = prompt(`Generated:\n\n${alias}\n\nWhere will you use this?`);
            if (note !== null) {
                const contexts = getContexts();
                if (!contexts[currentContextIndex].aliases) {
                    contexts[currentContextIndex].aliases = [];
                }
                contexts[currentContextIndex].aliases.push({
                    email: alias,
                    note: note.trim() || '(no note)'
                });
                saveContexts(contexts);
                viewContext(currentContextIndex);
            }
        };
        
        // Start
        renderDashboard();
    </script>
</body>
</html>
